version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     suvidha
      POSTGRES_PASSWORD: suvidha_pass
      POSTGRES_DB:       suvidha_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suvidha"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (OTP store + pub/sub) ──────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://suvidha:suvidha_pass@db:5432/suvidha_db
      REDIS_URL:    redis://redis:6379/0
      JWT_SECRET:   ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app

  # ─── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
